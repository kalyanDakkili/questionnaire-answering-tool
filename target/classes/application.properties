# Server
server.port=8080

# Database - H2 persistent file-based
spring.datasource.url=jdbc:h2:file:./data/questionnaire_db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Thymeleaf
spring.thymeleaf.cache=false

# File storage
app.upload.dir=./uploads

# Gemini AI API Key (set via environment variable: GEMINI_API_KEY)
app.gemini.api-key=${GEMINI_API_KEY:}