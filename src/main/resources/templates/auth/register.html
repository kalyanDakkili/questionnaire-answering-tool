<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - QuestionnaireAI</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-container">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>Questionnaire<span>AI</span></h1>
      <p>Create your account</p>
    </div>
    <div th:if="${error}" class="alert alert-danger">
      <span>&#9888;</span> <span th:text="${error}"></span>
    </div>
    <div th:if="${success}" class="alert alert-success">
      <span>&#10003;</span> <span th:text="${success}"></span>
    </div>
    <form th:action="@{/register}" method="post">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirmPassword" class="form-control" placeholder="Repeat password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
        Create Account
      </button>
    </form>
    <div class="auth-footer">
      Already have an account? <a th:href="@{/login}">Sign in</a>
    </div>
  </div>
</div>
</body>
</html>
