<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - QuestionnaireAI</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-container">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>Questionnaire<span>AI</span></h1>
      <p>Intelligent questionnaire answering powered by AI</p>
    </div>
    <div th:if="${error}" class="alert alert-danger">
      <span>&#9888;</span> <span th:text="${error}"></span>
    </div>
    <div th:if="${message}" class="alert alert-success">
      <span>&#10003;</span> <span th:text="${message}"></span>
    </div>
    <form th:action="@{/login}" method="post">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem;">
        Sign In
      </button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a th:href="@{/register}">Sign up</a>
    </div>
  </div>
</div>
</body>
</html>
